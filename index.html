  /* Dark overlay so card content stays readable */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.58);
    z-index: 0;
    pointer-events: none;
  }

  /* TV Static canvas */
  #static-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    opacity: 0.03;
    pointer-events: none;
    image-rendering: pixelated;
  }

  /* Pink glow matching lil peep art */
  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 50% 40%, rgba(255,20,147,0.1) 0%, transparent 65%),
      radial-gradient(ellipse 400px 600px at 20% 80%, rgba(232,121,160,0.06) 0%, transparent 65%);
    pointer-events: none;
    z-index: 1;
  }

  .container {
    width: 100%;
    max-width: 504px;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== PROFILE CARD ===== */
  .profile-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    position: relative;
  }

  #banner-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.09;
    image-rendering: pixelated;
  }

  .banner-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(12,9,9,0.85) 100%);
  }

  /* Scanlines */
  .banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 3;
  }

  .profile-body { padding: 0 24px 26px; }

  .avatar-wrap {
    margin-top: -50px;
    margin-bottom: 17px;
    position: relative;
    width: 96px;
  }

  /* Animated rainbow ring */
  .avatar-ring {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(
      from 0deg,
      #e879a0 0%, #ff69b4 20%, #c8a882 40%,
      #7289da 60%, #1db954 80%, #e879a0 100%
    );
    animation: spinRing 3.5s linear infinite;
    position: relative;
    z-index: 2;
  }

  @keyframes spinRing {
    from { filter: hue-rotate(0deg); }
    to   { filter: hue-rotate(360deg); }
  }

  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background: #1a1614;
    border: 2px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Glow pulse */
  .avatar-glow {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,20,147,0.35) 0%, transparent 65%);
    animation: glowPulse 2.5s ease-in-out infinite;
    z-index: 1;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.12); }
  }

  .username {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text);
    margin-top: 4px;
  }

  .badges { display: flex; gap: 5px; margin: 7px 0; }
  .badge  { font-size: 17px; }

  .bio {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    line-height: 1.7;
    margin: 8px 0 16px;
    letter-spacing: 0.02em;
  }

  /* ===== SOCIAL BUTTONS ===== */
  .socials { display: flex; gap: 12px; margin-top: 17px; flex-wrap: wrap; }

  .social-btn {
    width: 53px; height: 53px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    color: #fff;
    position: relative; overflow: hidden;
    /* White glow always on */
    box-shadow: 0 0 10px rgba(255,255,255,0.12), 0 0 20px rgba(255,255,255,0.06);
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.5));
  }

  .social-btn::before {
    content: ''; position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.2s;
  }

  .social-btn:hover {
    transform: translateY(-3px) scale(1.1);
    color: #fff;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.9));
    box-shadow: 0 0 18px rgba(255,255,255,0.3), 0 0 35px rgba(255,255,255,0.12);
  }


  .social-btn.yt::before   { background: radial-gradient(circle, rgba(255,68,68,0.3),   transparent 70%); }
  .social-btn.rblx::before { background: radial-gradient(circle, rgba(66,135,245,0.3),   transparent 70%); }
  .social-btn.sp::before   { background: radial-gradient(circle, rgba(29,185,84,0.3),   transparent 70%); }
  .social-btn.gh::before   { background: radial-gradient(circle, rgba(180,180,255,0.25), transparent 70%); }
  .social-btn:hover::before { opacity: 1; }

  .social-btn.yt:hover   { border-color: rgba(255,68,68,0.7);  box-shadow: 0 0 20px rgba(255,68,68,0.5);  filter: drop-shadow(0 0 8px rgba(255,68,68,0.8)); }
  .social-btn.rblx:hover { border-color: rgba(66,135,245,0.7); box-shadow: 0 0 20px rgba(66,135,245,0.5); filter: drop-shadow(0 0 8px rgba(66,135,245,0.8)); }
  .social-btn.sp:hover   { border-color: rgba(29,185,84,0.7);  box-shadow: 0 0 20px rgba(29,185,84,0.5);  filter: drop-shadow(0 0 8px rgba(29,185,84,0.8)); }
  .social-btn.gh:hover   { border-color: rgba(180,180,255,0.7); box-shadow: 0 0 20px rgba(180,180,255,0.4); filter: drop-shadow(0 0 8px rgba(180,180,255,0.8)); }

  .social-btn svg { width: 24px; height: 24px; fill: currentColor; position: relative; z-index: 1; }

  /* ===== DIVIDER ===== */
  .divider { display: flex; align-items: center; gap: 12px; opacity: 0.25; }
  .divider span { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--muted); white-space: nowrap; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ===== SPOTIFY ===== */
  .spotify-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
  }

  .spotify-header {
    padding: 13px 16px 10px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .spotify-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); flex: 1;
  }

  .spotify-embed-wrap iframe { display: block; }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--muted);
    opacity: 0.3; letter-spacing: 0.1em; margin-top: 4px;
  }

  /* ===== SPARKS ===== */
  .spark {
    position: fixed; border-radius: 50%;
    pointer-events: none; z-index: 2;
    animation: sparkFloat linear infinite;
  }

  @keyframes sparkFloat {
    0%   { opacity: 0;   transform: translateY(0) translateX(0); }
    8%   { opacity: 0.7; }
    92%  { opacity: 0.15; }
    100% { opacity: 0;   transform: translateY(-100vh) translateX(var(--drift, 10px)); }
  }
</style>

<script>
  function runStatic(canvas, w, h) {
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    function draw() {
      const img = ctx.createImageData(w, h);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255 | 0;
        d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
      }
      ctx.putImageData(img, 0, 0);
      setTimeout(() => requestAnimationFrame(draw), 45);
    }
    draw();
  }
  runStatic(document.getElementById('static-canvas'), 200, 200);
  runStatic(document.getElementById('banner-canvas'), 504, 156);
</script>
